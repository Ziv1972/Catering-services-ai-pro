# Backend Nixpacks build config — bypasses Docker/BuildKit cache corruption.
# Railway will detect this file and use Nixpacks instead of the Dockerfile.

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install --no-cache-dir -r requirements.txt",
  ". /opt/venv/bin/activate && pip install --no-cache-dir aiosqlite",
]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000} --proxy-headers --forwarded-allow-ips='*'"

[variables]
PYTHONUNBUFFERED = "1"
